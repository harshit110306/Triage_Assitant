<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Signin</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">

    <style>
        body {
            height: 100vh;
            background: linear-gradient(135deg, #4facfe, #00f2fe);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .card {
            width: 350px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }

        .card h2 {
            text-align: center;
        }
    </style>
</head>

<body>

<div class="card p-4">
    <h2 class="mb-3">Signin</h2>

    <!-- Flash Messages -->
    {% with messages = get_flashed_messages() %}
        {% if messages %}
            {% for message in messages %}
                <div class="alert alert-danger text-center p-2">{{ message }}</div>
            {% endfor %}
        {% endif %}
    {% endwith %}

    <form method="POST" action="{{ url_for('signin') }}">
        
        <div class="mb-3">
            <input type="email" class="form-control" name="email" placeholder="Enter Email" required>
        </div>

        <!-- Password with eye button -->
        <div class="mb-3 input-group">
            <input type="password" id="password" class="form-control" name="password" placeholder="Enter Password" required>
            <span class="input-group-text" onclick="togglePassword()" style="cursor:pointer;">
                <i id="eyeIcon" class="bi bi-eye"></i>
            </span>
        </div>

        <button type="submit" class="btn btn-primary w-100">Signin</button>
    </form>

    <div class="text-center mt-3">
        Don't have an account? 
        <a href="{{ url_for('signup') }}" class="text-success">Signup</a>
    </div>
</div>

<!-- JS -->
<script>
    function togglePassword() {
        let password = document.getElementById("password");
        let icon = document.getElementById("eyeIcon");

        if (password.type === "password") {
            password.type = "text";
            icon.classList.remove("bi-eye");
            icon.classList.add("bi-eye-slash");
        } else {
            password.type = "password";
            icon.classList.remove("bi-eye-slash");
            icon.classList.add("bi-eye");
        }
    }
</script>

</body>
</html>
