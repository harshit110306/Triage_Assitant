<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Signup</title>

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">

<style>
body {
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: linear-gradient(135deg,#4facfe,#00f2fe);
}

.container-box {
    width: 400px;
    background: white;
    padding: 25px;
    border-radius: 12px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.2);
}

.password-container {
    position: relative;
}

.eye-icon {
    position: absolute;
    right: 10px;
    top: 50%;
    transform: translateY(-50%);
    cursor: pointer;
}

.strength {
    height: 6px;
    background: #ddd;
    border-radius: 5px;
    overflow: hidden;
}

.strength i {
    display: block;
    height: 100%;
    width: 0%;
}

.strength-text {
    font-size: 13px;
    margin-top: 5px;
}

.invalid-msg {
    color: red;
    font-size: 13px;
}

.btn-custom {
    background: #28a745;
    color: white;
}

.btn-custom:hover {
    background: #218838;
}
</style>
</head>

<body>

<div class="container-box">
    <h3 class="text-center mb-3">Signup</h3>

    <!-- Flash -->
    {% with messages = get_flashed_messages() %}
        {% if messages %}
            {% for message in messages %}
                <div class="text-danger text-center">{{ message }}</div>
            {% endfor %}
        {% endif %}
    {% endwith %}

    <form method="POST" action="{{ url_for('signup') }}">

        <!-- First + Last Name -->
        <div class="row">
            <div class="col">
                <input type="text" name="first_name" class="form-control mb-2" placeholder="First Name" required>
            </div>
            <div class="col">
                <input type="text" name="last_name" class="form-control mb-2" placeholder="Last Name" required>
            </div>
        </div>

        <input type="email" name="email" class="form-control mb-2" placeholder="Email" required>

        <!-- Role Selection -->
        <select name="role" class="form-control mb-2" required>
            <option value="lab_tech">Lab Assistant</option>
            <option value="doctor">Doctor</option>
        </select>

        <!-- Password -->
        <div class="password-container mb-2">
            <input type="password" id="password" name="password"
                   class="form-control"
                   placeholder="Password"
                   required oninput="checkPasswordStrength()">

            <i class="bi bi-eye eye-icon"
               onclick="togglePassword('password', this)"></i>
        </div>

        <!-- Confirm Password -->
        <div class="password-container mb-2">
            <input type="password" id="confirm_password"
                   name="confirm_password"
                   class="form-control"
                   placeholder="Confirm Password"
                   required oninput="checkPasswordsMatch()">

            <i class="bi bi-eye eye-icon"
               onclick="togglePassword('confirm_password', this)"></i>

            <div id="match-msg" class="invalid-msg" style="display:none;">
                Passwords do not match.
            </div>
        </div>

        <!-- Strength -->
        <div class="mb-2">
            <div class="d-flex align-items-center gap-2">
                <div class="strength w-100">
                    <i id="strength-bar"></i>
                </div>

                <button type="button"
                        class="btn btn-light btn-sm"
                        data-bs-toggle="tooltip"
                        title="Use 8+ chars, 1 letter & 1 special char">
                    <i class="bi bi-info-lg"></i>
                </button>
            </div>

            <div class="strength-text" id="strength-text"></div>
        </div>

        <button type="submit" class="btn btn-custom w-100 mt-2">Signup</button>
    </form>

    <div class="text-center mt-3">
        Already have an account? 
        <a href="{{ url_for('signin') }}">Signin</a>
    </div>
</div>

<!-- JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<script>
function togglePassword(fieldId, icon) {
    const field = document.getElementById(fieldId);

    if (field.type === "password") {
        field.type = "text";
        icon.classList.replace("bi-eye", "bi-eye-slash");
    } else {
        field.type = "password";
        icon.classList.replace("bi-eye-slash", "bi-eye");
    }
}

function checkPasswordStrength() {
    const password = document.getElementById("password").value;
    const bar = document.getElementById("strength-bar");
    const text = document.getElementById("strength-text");

    let strength = 0;

    if (password.length >= 8) strength++;
    if (/[A-Za-z]/.test(password)) strength++;
    if (/[!@#$%^&*]/.test(password)) strength++;

    if (strength === 1) {
        bar.style.width = "33%";
        bar.style.background = "red";
        text.innerHTML = "Weak";
    } else if (strength === 2) {
        bar.style.width = "66%";
        bar.style.background = "orange";
        text.innerHTML = "Medium";
    } else if (strength === 3) {
        bar.style.width = "100%";
        bar.style.background = "green";
        text.innerHTML = "Strong";
    } else {
        bar.style.width = "0%";
        text.innerHTML = "";
    }
}

function checkPasswordsMatch() {
    const p = document.getElementById("password").value;
    const cp = document.getElementById("confirm_password").value;
    const msg = document.getElementById("match-msg");

    msg.style.display = (cp && p !== cp) ? "block" : "none";
}

// Tooltip
var tooltipTriggerList = [].slice.call(document.querySelectorAll('[data-bs-toggle="tooltip"]'))
tooltipTriggerList.map(el => new bootstrap.Tooltip(el))
</script>

</body>
</html>
