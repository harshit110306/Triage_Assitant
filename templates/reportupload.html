<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Upload Report</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f6f9;
            margin: 0;
        }

       
        /* Container */
        .container {
            width: 400px;
            margin: 60px auto;
            background: white;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }

        h2 {
            text-align: center;
            margin-bottom: 20px;
        }

        input, select {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border-radius: 5px;
            border: 1px solid #ccc;
        }

        button {
            width: 100%;
            padding: 10px;
            background: #28a745;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
        }

        button:hover {
            background: #218838;
        }

        .flash {
            color: red;
            text-align: center;
            margin-bottom: 10px;
        }

        .back {
            display: block;
            text-align: center;
            margin-top: 15px;
            text-decoration: none;
            color: #007bff;
        }

        .back:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

<!-- Form Container -->
<div class="container">
    

    <!-- Flash Messages -->
    {% with messages = get_flashed_messages() %}
        {% if messages %}
            {% for message in messages %}
                <div class="flash">{{ message }}</div>
            {% endfor %}
        {% endif %}
    {% endwith %}

<h2>Upload Patient Report</h2>
    <form method="POST" action="{{ url_for('report_upload.report_upload') }}" enctype="multipart/form-data">

        <input type="text" name="patient_id" placeholder="Patient ID" required>

        <input type="text" name="patient_name" placeholder="Patient Name" required>

        <input type="number" name="age" placeholder="Age" required>

        <select name="gender" required>
            <option value="">Select Gender</option>
            <option value="Male">Male</option>
            <option value="Female">Female</option>
        </select>

        <input type="text" name="disease_name" placeholder="Disease Name" required>

        <input type="file" name="report_file" required>

        <button type="submit">Upload Report</button>
    </form>

    <a href="{{ url_for('lab_dashboard') }}" class="back">⬅ Back to Dashboard</a>
</div>

</body>
</html>
